<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试插件加载</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>测试小红书助手插件加载</h1>
    <div id="status"></div>
    <script>
        // 检查插件是否加载
        function checkExtension() {
            const status = document.getElementById('status');
            
            // 尝试向插件发送消息
            chrome.runtime.sendMessage(
                'your-extension-id', // 这里需要替换为插件的实际 ID
                { action: 'ping' },
                function(response) {
                    if (chrome.runtime.lastError) {
                        status.innerHTML = '<div class="status error">插件未加载或未找到: ' + chrome.runtime.lastError.message + '</div>';
                    } else {
                        status.innerHTML = '<div class="status success">插件已成功加载</div>';
                    }
                }
            );
        }
        
        // 页面加载完成后检查
        window.onload = checkExtension;
    </script>
</body>
</html>
